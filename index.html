<script>
function loadStatus() {
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTEZoEvYH5segQdH-65y4KzzdngpLKjQx4J3j7jXXWWNkFYyQf9jcSHVL0TfmBiWQtnoRlyewgOsof2/pub?output=csv&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {
      let rows = data.split("\n");
      let status = rows[1].split(",")[1].trim();

      let el = document.getElementById("status");

      if (status === "open") {
        el.innerHTML = "🟢 เปิดร้าน ทักได้ค่ะ";
        el.className = "open";
      } else {
        el.innerHTML = "🔴 ปิดร้าน ไม่พร้อมตอบค่ะ";
        el.className = "closed";
      }
    });
}

// โหลดครั้งแรก
loadStatus();

// รีโหลดทุก 10 วินาที
setInterval(loadStatus, 10000);
</script>
